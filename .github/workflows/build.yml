name: 快速打包固件

on:
  workflow_dispatch:
    inputs:
      rootfs_size:
        description: '根分区大小 (MiB)'
        required: true
        default: '512'
      extra_packages:
        description: '额外的软件包 (空格分隔)'
        required: false
        default: 'luci-app-ssr-plus luci-i18n-ssr-plus-zh-cn luci-app-upnp luci-app-turboacc'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检查分支
        uses: actions/checkout@v4

      - name: 安装 zstd 依赖
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: 下载并解压 Image Builder
        run: |
          # 下载 24.10.5 x86_64
          wget https://downloads.immortalwrt.org/releases/24.10.5/targets/x86/64/immortalwrt-imagebuilder-24.10.5-x86-64.Linux-x86_64.tar.zst
          
          # 强制指定解压到固定目录 'ib' 避免路径模糊
          mkdir ib
          tar --zstd -xf *.tar.zst -C ib --strip-components=1
          echo "IB_DIR=$GITHUB_WORKSPACE/ib" >> $GITHUB_ENV

      - name: 配置分区大小
        run: |
          cd ${{ env.IB_DIR }}
          # 在 .config 中修改 Rootfs 大小
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }}/' .config
          # 同时也修改底层的默认配置文件以防万一
          if [ -f include/image.mk ]; then
            sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE:=.*/CONFIG_TARGET_ROOTFS_PARTSIZE:=${{ github.event.inputs.rootfs_size }}/' include/image.mk
          fi

      - name: 生成固件
        run: |
          cd ${{ env.IB_DIR }}
          # N5105 建议加上 kmod-igc (2.5G网卡驱动)
          # 添加 fdisk 和 resize2fs 方便后续扩容
          make image PACKAGES="${{ github.event.inputs.extra_packages }} kmod-igc fdisk resize2fs"

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-24.10.5-Custom
          path: ${{ env.IB_DIR }}/bin/targets/x86/64/*.img.gz

name: 编译 OpenWrt (全功能定制版)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt 版本'
        required: true
        default: '24.10.5'
      rootfs_size:
        description: '根分区大小 (MiB)'
        required: true
        default: '1024'
      pppoe_user:
        description: '宽带拨号账号'
        required: false
      pppoe_pass:
        description: '宽带拨号密码'
        required: false
      extra_packages:
        description: '选中的插件列表'
        required: false
      custom_repo_url:
        description: '第三方仓库地址'
        required: false
        default: 'https://dl.openwrt.ai/releases/24.10/packages/x86_64'
      custom_ipk_urls:
        description: '外部 IPK 下载直链'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检查分支
        uses: actions/checkout@v4

      - name: 环境准备
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd qemu-utils build-essential libncurses5-dev libncursesw5-dev \
          zlib1g-dev gawk genisoimage git gettext libssl-dev xsltproc rsync wget unzip python3 curl jq

      - name: 下载 Image Builder
        run: |
          VERSION=${{ github.event.inputs.version }}
          URL="https://downloads.openwrt.org/releases/$VERSION/targets/x86/64/openwrt-imagebuilder-$VERSION-x86-64.Linux-x86_64.tar.zst"
          wget $URL
          mkdir ib && tar --zstd -xf *.tar.zst -C ib --strip-components=1

      - name: 配置软件源
        run: |
          cd ib
          BASE_URL=${{ github.event.inputs.custom_repo_url }}
          echo "src/gz custom_kiddin9 $BASE_URL/kiddin9" >> repositories.conf
          echo "src/gz custom_luci $BASE_URL/luci" >> repositories.conf
          echo "src/gz custom_pkgs $BASE_URL/packages" >> repositories.conf
          sed -i 's/^option check_signature/# option check_signature/' repositories.conf

      - name: 处理外部 IPK 直链
        run: |
          mkdir -p ib/packages
          for url in ${{ github.event.inputs.custom_ipk_urls }}; do
            [ -n "$url" ] && wget -P ib/packages/ "$url" || true
          done

      - name: 预设网络配置
        run: |
          mkdir -p ib/files/etc/config
          cat <<EOF > ib/files/etc/config/network
          config interface 'loopback'
              option device 'lo'
              option proto 'static'
              option ipaddr '127.0.0.1'
              option netmask '255.0.0.0'
          config device
              option name 'br-lan'
              option type 'bridge'
              list ports 'eth0'
              list ports 'eth1'
              list ports 'eth2'
          config interface 'lan'
              option device 'br-lan'
              option proto 'static'
              option ipaddr '192.168.1.1'
              option netmask '255.255.255.0'
          config interface 'wan'
              option device 'eth3'
              option proto 'pppoe'
              option username '${{ github.event.inputs.pppoe_user }}'
              option password '${{ github.event.inputs.pppoe_pass }}'
          EOF

      - name: 修改分区大小
        run: |
          cd ib
          sed -i "s/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }}/" .config
          find target/linux/x86/ -name "Makefile" -exec sed -i "s/CONFIG_TARGET_ROOTFS_PARTSIZE:=.*/CONFIG_TARGET_ROOTFS_PARTSIZE:=${{ github.event.inputs.rootfs_size }}/" {} +

      - name: 执行固件打包
        run: |
          cd ib
          make image \
            PACKAGES="${{ github.event.inputs.extra_packages }} luci luci-i18n-base-zh-cn luci-app-firewall luci-i18n-firewall-zh-cn kmod-igc kmod-r8125 kmod-r8168 -dnsmasq dnsmasq-full fdisk lsblk ppp-mod-pppoe" \
            FILES="files/" \
            CONFIG_TARGET_ROOTFS_PARTSIZE=${{ github.event.inputs.rootfs_size }}

      - name: 上传至 Gofile 并生成直链
        run: |
          cd ib/bin/targets/x86/64/
          FIRMWARE_FILE=$(ls *-combined-efi.img.gz | head -n 1)
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name')
          UPLOAD_RES=$(curl -F "file=@$FIRMWARE_FILE" "https://$SERVER.gofile.io/contents/uploadfile")
          DOWNLOAD_PAGE=$(echo $UPLOAD_RES | jq -r '.data.downloadPage')
          echo "GOFILE_LINK: $DOWNLOAD_PAGE"
          echo "### 🚀 免登录下载地址: $DOWNLOAD_PAGE" >> $GITHUB_STEP_SUMMARY
